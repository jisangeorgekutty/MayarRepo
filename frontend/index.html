<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <link rel="canonical" href="https://mayar-shop-hero.lovable.app/" />
    <meta name="theme-color" content="#1a2340" />

    <!-- Favicons -->
    <link rel="icon" href="/favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="msapplication-TileImage" content="/android-chrome-192x192.png" />
    <meta name="msapplication-TileColor" content="#1a2340" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Mayar Shop" />
    <meta property="og:title" content="Mayar Shop | Fashion, Beauty &amp; Lifestyle Store" />

    <meta property="og:url" content="https://mayar-shop-hero.lovable.app/" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary" />

    <meta name="twitter:image" content="https://mayar-shop-hero.lovable.app/android-chrome-512x512.png" />

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "Organization",
          "name": "Mayar Shop",
          "url": "https://mayar-shop-hero.lovable.app",
          "logo": "https://mayar-shop-hero.lovable.app/android-chrome-512x512.png"
        },
        {
          "@type": "WebSite",
          "name": "Mayar Shop",
          "url": "https://mayar-shop-hero.lovable.app",
          "potentialAction": {
            "@type": "SearchAction",
            "target": "https://mayar-shop-hero.lovable.app/search?q={search_term_string}",
            "query-input": "required name=search_term_string"
          }
        }
      ]
    }
    </script>
  </head>

  <body>
